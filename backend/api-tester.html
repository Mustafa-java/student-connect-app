<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .status {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status.success {
            border-left: 5px solid #22c55e;
        }
        .status.error {
            border-left: 5px solid #ef4444;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .response {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .response.success {
            background: #f0fdf4;
            border-color: #22c55e;
            color: #166534;
        }
        .response.error {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .token-display {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Student Connect API</h1>
            <p>PostgreSQL Migration Test</p>
        </div>

        <div class="status success">
            <strong>✅ Backend Status:</strong> Running on PostgreSQL<br>
            <strong>🌐 URL:</strong> https://student-connect-backend.onrender.com
        </div>

        <!-- Регистрация -->
        <div class="card">
            <h2>📝 Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя:</label>
                    <input type="text" id="reg_name" value="Test User" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="reg_email" value="test@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="reg_password" value="password123" required>
                </div>
                <div class="form-group">
                    <label>Университет:</label>
                    <input type="text" id="reg_university" value="Test University">
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>
            <div class="loading" id="registerLoading">
                <div class="spinner"></div>
                <p>Регистрация...</p>
            </div>
            <div id="registerResponse"></div>
        </div>

        <!-- Логин -->
        <div class="card">
            <h2>🔐 Вход</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="login_email" value="test@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="login_password" value="password123" required>
                </div>
                <button type="submit">Войти</button>
            </form>
            <div class="loading" id="loginLoading">
                <div class="spinner"></div>
                <p>Вход...</p>
            </div>
            <div id="loginResponse"></div>
            <div id="tokenDisplay"></div>
        </div>

        <!-- Получить профиль -->
        <div class="card">
            <h2>👤 Мой профиль</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label>Token (автоматически заполнится после логина):</label>
                    <input type="text" id="profile_token" placeholder="Bearer token...">
                </div>
                <button type="submit">Получить профиль</button>
            </form>
            <div class="loading" id="profileLoading">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
            <div id="profileResponse"></div>
        </div>

        <!-- Список пользователей -->
        <div class="card">
            <h2>👥 Список пользователей</h2>
            <button onclick="getUsers()">Получить всех пользователей</button>
            <div class="loading" id="usersLoading">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
            <div id="usersResponse"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://student-connect-backend.onrender.com';
        let currentToken = '';

        // Регистрация
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loading = document.getElementById('registerLoading');
            const response = document.getElementById('registerResponse');

            loading.classList.add('active');
            response.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('reg_name').value,
                        email: document.getElementById('reg_email').value,
                        password: document.getElementById('reg_password').value,
                        university: document.getElementById('reg_university').value
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    response.className = 'response success';
                    response.textContent = JSON.stringify(data, null, 2);
                    if (data.token) {
                        currentToken = data.token;
                        document.getElementById('profile_token').value = data.token;
                    }
                } else {
                    response.className = 'response error';
                    response.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                response.className = 'response error';
                response.textContent = 'Ошибка: ' + error.message;
            } finally {
                loading.classList.remove('active');
            }
        });

        // Логин
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loading = document.getElementById('loginLoading');
            const response = document.getElementById('loginResponse');
            const tokenDisplay = document.getElementById('tokenDisplay');

            loading.classList.add('active');
            response.innerHTML = '';
            tokenDisplay.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('login_email').value,
                        password: document.getElementById('login_password').value
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    response.className = 'response success';
                    response.textContent = JSON.stringify(data, null, 2);
                    if (data.token) {
                        currentToken = data.token;
                        document.getElementById('profile_token').value = data.token;
                        tokenDisplay.className = 'token-display';
                        tokenDisplay.innerHTML = `<strong>✅ Token сохранен!</strong><br>${data.token}`;
                    }
                } else {
                    response.className = 'response error';
                    response.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                response.className = 'response error';
                response.textContent = 'Ошибка: ' + error.message;
            } finally {
                loading.classList.remove('active');
            }
        });

        // Профиль
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loading = document.getElementById('profileLoading');
            const response = document.getElementById('profileResponse');
            const token = document.getElementById('profile_token').value;

            if (!token) {
                response.className = 'response error';
                response.textContent = 'Ошибка: Сначала войдите в систему';
                return;
            }

            loading.classList.add('active');
            response.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/api/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await res.json();

                if (res.ok) {
                    response.className = 'response success';
                    response.textContent = JSON.stringify(data, null, 2);
                } else {
                    response.className = 'response error';
                    response.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                response.className = 'response error';
                response.textContent = 'Ошибка: ' + error.message;
            } finally {
                loading.classList.remove('active');
            }
        });

        // Список пользователей
        async function getUsers() {
            const loading = document.getElementById('usersLoading');
            const response = document.getElementById('usersResponse');
            const token = document.getElementById('profile_token').value;

            if (!token) {
                response.className = 'response error';
                response.textContent = 'Ошибка: Сначала войдите в систему';
                return;
            }

            loading.classList.add('active');
            response.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/api/users`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await res.json();

                if (res.ok) {
                    response.className = 'response success';
                    response.textContent = JSON.stringify(data, null, 2);
                } else {
                    response.className = 'response error';
                    response.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                response.className = 'response error';
                response.textContent = 'Ошибка: ' + error.message;
            } finally {
                loading.classList.remove('active');
            }
        }
    </script>
</body>
</html>
