name: student_connect
description: "СтудХаб — Платформа для студентов: социальная сеть, портфолио проектов и мессенджер."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  readmore: ^3.0.0
  
  # Animations
  lottie: ^3.1.2
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  
  # Navigation
  go_router: ^14.2.0
  
  # Network & API
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Picker
  image_picker: ^1.1.2
  video_player: ^2.9.1
  path_provider: ^2.1.4
  file_picker: ^8.0.0+2

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.0

  # Icons
  material_symbols_icons: ^4.2719.1
  font_awesome_flutter: ^10.7.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
